version: "3.9"

networks:
  workflow-net:
    driver: bridge

services:

  # ── Angular (nginx) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - workflow-net
    restart: unless-stopped

  # ── Spring Boot ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    expose:
      - "8080"
    environment:
      MONGODB_URI:           ${MONGODB_URI}
      JWT_SECRET:            ${JWT_SECRET}
      FRONTEND_URL:          ${FRONTEND_URL}
      AI_BASE_URL:           http://ia:5000
      TF_BASE_URL:           http://tf:8001
      CLAUDE_API_KEY:        ${CLAUDE_API_KEY}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION:            ${AWS_REGION:-us-east-2}
      AWS_BUCKET_NAME:       ${AWS_BUCKET_NAME:-}
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/auth/login | grep -qE '^[1-5][0-9]{2}$'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    networks:
      - workflow-net
    restart: unless-stopped

  # ── FastAPI IA (Claude) ───────────────────────────────────────────────────
  ia:
    build:
      context: ./backend/IA
    expose:
      - "5000"
    environment:
      MONGODB_URI:    ${MONGODB_URI}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
    networks:
      - workflow-net
    restart: unless-stopped

  # ── FastAPI TensorFlow ────────────────────────────────────────────────────
  tf:
    build:
      context: ./backend/Tensorflow
    expose:
      - "8001"
    environment:
      MONGODB_URI:     ${MONGODB_URI}
      SPRING_API_URL:  http://backend:8080/api
      SPRING_EMAIL:    ${TF_SPRING_EMAIL}
      SPRING_PASSWORD: ${TF_SPRING_PASSWORD}
    volumes:
      - tf_models:/app/static/models
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - workflow-net
    restart: unless-stopped

volumes:
  backend_uploads:
  tf_models:
